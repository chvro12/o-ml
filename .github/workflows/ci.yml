name: Tests et images

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dependances de test
        run: python -m pip install -r requirements-dev.txt

      - name: Verifier que les modeles sont reproductibles
        run: python scripts/train_models.py

      - name: Tests et seuil de couverture
        run: pytest --cov=services --cov-report=term-missing --cov-fail-under=80

  images:
    needs: tests
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Configurer QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion a Docker Hub
        if: github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Construire et pousser preprocessing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/preprocessing/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: ${{ env.DOCKERHUB_USERNAME != '' && format('{0}/tp-text-preprocessing:1.0.0', env.DOCKERHUB_USERNAME) || 'tp-text-preprocessing:ci' }}

      - name: Construire et pousser monitoring
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/monitoring/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: ${{ env.DOCKERHUB_USERNAME != '' && format('{0}/tp-text-monitoring:1.0.0', env.DOCKERHUB_USERNAME) || 'tp-text-monitoring:ci' }}

      - name: Construire et pousser inference
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/inference/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: ${{ env.DOCKERHUB_USERNAME != '' && format('{0}/tp-text-inference:1.0.0', env.DOCKERHUB_USERNAME) || 'tp-text-inference:ci' }}
